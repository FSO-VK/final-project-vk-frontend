name: CI — frontend lint, build-check, test, publish-on-develop

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to run against (example: feature/x or develop or master)"
        required: false
        default: ""

env:
  NODE_VERSION: '24.9.x'
  IMAGE_REPO: ghcr.io/fso-vk/fso-frontend

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Run frontend tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  build:
    name: Build (check image builds)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine build parameters
        id: vars
        run: |
          # Определяем тег и режим один раз для всех случаев
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="handmade"
            MODE="develop"
          elif [ "${{ github.ref }}" = "refs/heads/master" ]; then
            TARGET="master"
            MODE="prod"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            TARGET="develop"
            MODE="develop"
          else
            TARGET="pr-test"
            MODE="develop"
          fi
          
          echo "TARGET=${TARGET}" >> $GITHUB_ENV
          echo "MODE=${MODE}" >> $GITHUB_ENV
          echo "Prepared TARGET=${TARGET} MODE=${MODE}"

      - name: Install dependencies (build check)
        run: npm ci

      - name: Run frontend build to validate
        run: |
          if [ "${MODE}" = "develop" ]; then
            # try develop build scripts if present, otherwise fall back to generic build
            npm run develop-build:client --if-present || npm run develop-build --if-present || npm run build --if-present || true
          else
            npm run prod-build:client --if-present || npm run build --if-present || true
          fi

      - name: Build Docker image (no push)
        run: |
          TAG="${{ env.IMAGE_REPO }}:${TARGET}"
          echo "Building image ${TAG} using Dockerfile (root) with mode=${MODE}"
          docker buildx build --load --build-arg mode=${MODE} --tag "${TAG}" -f ./Dockerfile .

  publish:
    name: Publish image (conditional)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          # В publish всегда используем тег develop и режим develop
          TAG="${{ env.IMAGE_REPO }}:develop"
          echo "Buildx build+push -> ${TAG} (mode=develop)"
          docker buildx build --push --platform linux/amd64,linux/arm64 \
            --build-arg mode=develop \
            --tag "${TAG}" \
            -f ./Dockerfile .