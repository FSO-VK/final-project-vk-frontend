name: CI — lint, build-check, test, publish-on-dev (frontend)

# Триггеры: push/pull_request в master/dev и ручной запуск
on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to run against (example: feature/x or dev or master)"
        required: false
        default: ""

env:
  IMAGE_REPO: ghcr.io/fso-vk/fso-frontend
  NODE_VERSION: '20.x'

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Устанавливаем Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Устанавливаем зависимости
      - name: Install dependencies
        run: npm ci

      # Линтим проект
      - name: Run ESLint
        run: npm run lint

