  test:
    name: Run frontend tests
    runs-on: ubuntu-latest
    #needs: build
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      # Запуск тестов (можно добавить coverage)
      - name: Run tests
        run: npm run test

